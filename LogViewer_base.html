        sectionOpen[sec] = !sectionOpen[sec];
        var body  = document.getElementById('fp-sec-' + sec);
        var arrow = secHdr.querySelector('.fp-arrow');
        if (body)  body.style.display  = sectionOpen[sec] ? '' : 'none';
        if (arrow) arrow.textContent   = sectionOpen[sec] ? '\u25BE' : '\u25B8';
        return;
      }

      var thEl = t.closest && t.closest('th[data-sort]');
      if (thEl) {
        var col = thEl.getAttribute('data-sort');
        sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : 'asc';
        sortCol = col;
        triggerRender(); return;
      }

      if (t.classList && t.classList.contains('ct-toggle')) {
        F.changeTypes[t.getAttribute('data-ct')] ^= true;
        page = 0; triggerRender(); return;
      }

      if (t.id === 'tlClear') { F.dateFrom = ''; F.dateTo = ''; page = 0; triggerRender(); return; }

      if (t.classList && t.classList.contains('btn-lc-owner')) {
        ev.stopPropagation();
        var idx = parseInt(t.getAttribute('data-lc-idx'), 10);
        if (lcRecordCache[idx]) openOwnerModal(lcRecordCache[idx]);
        return;
      }

      if (t.classList && t.classList.contains('btn-lc-resource')) {
        ev.stopPropagation();
        var idx = parseInt(t.getAttribute('data-lc-idx'), 10);
        if (lcRecordCache[idx]) openResourceModal(lcRecordCache[idx]);
        return;
      }

      // Lifecycle: suggestion click (add/remove owner)
      var sugEl = t.closest && t.closest('.lc-sug-item[data-sug-key]');
      if (sugEl) {
        var sugKey = sugEl.getAttribute('data-sug-key');
        var selIdx = lcSelected.indexOf(sugKey);
        if (selIdx >= 0) {
          lcSelected.splice(selIdx, 1);
          delete lcOwnerData[sugKey];
          if (lcActiveOwner === sugKey) lcActiveOwner = null; lcPanelExpanded = {};
        } else {
          // Find owner data from current suggestion pool
          var sug2 = lcGetSuggestions();
          var found = null;
          if (sug2) {
            for (var si = 0; si < sug2.list.length; si++) {
              if ((sug2.list[si].id || sug2.list[si].name) === sugKey) { found = sug2.list[si]; break; }
            }
          }
          if (found) {
            var colorIdx = Object.keys(lcOwnerData).length % LC_PALETTE.length;
            lcOwnerData[sugKey] = { name: found.name, id: found.id, orders: found.orders || [], color: LC_PALETTE[colorIdx] };
            lcSelected.push(sugKey);
          }
        }
        render(); return;
      }

      // Lifecycle: chip remove
      var chipRm = t.closest && t.closest('.lc-chip-rm[data-rm-key]');
      if (chipRm) {
        var rmKey = chipRm.getAttribute('data-rm-key');
        var ri = lcSelected.indexOf(rmKey);
        if (ri >= 0) lcSelected.splice(ri, 1);
        delete lcOwnerData[rmKey];
        if (lcActiveOwner === rmKey) lcActiveOwner = null; lcPanelExpanded = {};
        render(); return;
      }

      // Lifecycle: toggle owner's full order list
      var tlRowEl = t.closest && t.closest('.lc-tl-row[data-lc-owner]');
      if (tlRowEl) {
        var owKey = tlRowEl.getAttribute('data-lc-owner');
        lcActiveOwner   = lcActiveOwner === owKey ? null : owKey;
        lcPanelExpanded = {};
        render(); return;
      }

      // Lifecycle: expand/collapse individual order row in panel
      var prowEl = t.closest && t.closest('[data-lc-prow]');
      if (prowEl) {
        var pKey = prowEl.getAttribute('data-lc-prow');
        lcPanelExpanded[pKey] = !lcPanelExpanded[pKey];
        render(); return;
      }


      if (t.classList && t.classList.contains('btn-owner')) {
        ev.stopPropagation();
        var gi  = parseInt(t.getAttribute('data-owner-idx'), 10);
        var src = serverMode ? (serverResult ? serverResult.records : []) : getFiltered();
        if (src[gi]) openOwnerModal(src[gi]);
        return;
      }

      if (t.classList && t.classList.contains('btn-resource')) {
        ev.stopPropagation();
        var gi  = parseInt(t.getAttribute('data-resource-idx'), 10);
        var src = serverMode ? (serverResult ? serverResult.records : []) : getFiltered();
        if (src[gi]) openResourceModal(src[gi]);
        return;
      }

      if (t.hasAttribute && t.hasAttribute('data-pg') && !t.disabled) {
        ev.stopPropagation();
        page = parseInt(t.getAttribute('data-pg'), 10);
        triggerRender(); return;
      }

      var rowEl = t.closest && t.closest('tr[data-expkey]');
      if (rowEl) {
        var expKey = rowEl.getAttribute('data-expkey');
        var gi     = parseInt(rowEl.getAttribute('data-idx'), 10);
        var wrap   = rowEl.closest('.table-wrap'), wScrl = wrap ? wrap.scrollTop : 0;
        var rTop   = rowEl.getBoundingClientRect().top;
        expanded[expKey] = !expanded[expKey];
        render();   // expand/collapse never needs a server refetch
        var wrap2 = document.querySelector('.table-wrap');
        if (wrap2) wrap2.scrollTop = wScrl;
        var row2 = document.querySelector("tr[data-idx='" + gi + "']");
        if (row2) window.scrollTo(0, (window.pageYOffset || document.documentElement.scrollTop) + (row2.getBoundingClientRect().top - rTop));
      }
    });

    document.addEventListener('change', function (ev) {
      var t = ev.target;
      switch (t.id) {
        case 'fSourceEntity':  F.sourceEntity = t.value; page = 0; triggerRender(); break;
        case 'fTargetEntity':  F.targetEntity = t.value; page = 0; triggerRender(); break;
        case 'fDateFrom':      F.dateFrom     = t.value; page = 0; triggerRender(); break;
        case 'fDateTo':        F.dateTo       = t.value; page = 0; triggerRender(); break;
        case 'fChangesMin':    F.changesMin   = t.value; page = 0; triggerRender(); break;
        case 'fChangesMax':    F.changesMax   = t.value; page = 0; triggerRender(); break;
        case 'fOwnerAttr':     F.ownerAttr    = t.value; page = 0; triggerRender(); break;
        case 'fResourceAttr':  F.resourceAttr = t.value; page = 0; triggerRender(); break;
        case 'fChangesAttr':   F.changesAttr  = t.value; page = 0; triggerRender(); break;
        case 'fRolesDir':      F.rolesDir     = t.value; page = 0; triggerRender(); break;
        case 'fRolesMin':      F.rolesMin     = t.value; page = 0; triggerRender(); break;
        case 'fRolesMax':      F.rolesMax     = t.value; page = 0; triggerRender(); break;
      }
    });

    document.addEventListener('input', function (ev) {
      var t = ev.target, val = t.value;
      clearTimeout(debounceTimer);
      switch (t.id) {
        case 'fSearch':
          debounceTimer = setTimeout(function () { F.search = val; page = 0; triggerRender(); }, 250); break;
        case 'fOwnerName':
          debounceTimer = setTimeout(function () { F.ownerName = val; page = 0; triggerRender(); }, 250); break;
        case 'fOwnerIdentifier':
          debounceTimer = setTimeout(function () { F.ownerIdentifier = val; page = 0; triggerRender(); }, 250); break;
        case 'fOwnerAttrValue':
          debounceTimer = setTimeout(function () { F.ownerAttrValue = val; page = 0; triggerRender(); }, 250); break;
        case 'fResourceName':
          debounceTimer = setTimeout(function () { F.resourceName = val; page = 0; triggerRender(); }, 250); break;
        case 'fResourceIdentifier':
          debounceTimer = setTimeout(function () { F.resourceIdentifier = val; page = 0; triggerRender(); }, 250); break;
        case 'fResourceAttrValue':
          debounceTimer = setTimeout(function () { F.resourceAttrValue = val; page = 0; triggerRender(); }, 250); break;
        case 'fChangesValue':
          debounceTimer = setTimeout(function () { F.changesValue = val; page = 0; triggerRender(); }, 250); break;
        case 'fRolesValue':
          debounceTimer = setTimeout(function () { F.rolesValue = val; page = 0; triggerRender(); }, 250); break;
        case 'lcSearch':
          debounceTimer = setTimeout(function () { F.lifecycleSearch = val; lcActiveOwner = null; lcPanelExpanded = {}; triggerRender(); }, 300); break;
      }
    });

    document.addEventListener('mousedown', function (ev) {
      var bar = ev.target.closest && ev.target.closest('.tl-bar-group[data-date]');
      if (!bar) return;
      ev.preventDefault();
      var d = bar.getAttribute('data-date');
      tlDrag = { active: true, start: d, end: d };
      highlightTlRange(d, d);
    });

    document.addEventListener('mousemove', function (ev) {
      if (!tlDrag.active) return;
      var bar = ev.target.closest && ev.target.closest('.tl-bar-group[data-date]');
      if (!bar) return;
      tlDrag.end = bar.getAttribute('data-date');
      highlightTlRange(tlDrag.start, tlDrag.end);
    });

    document.addEventListener('mouseup', function () {
      if (!tlDrag.active) return;
      tlDrag.active = false;
      var a = tlDrag.start, b = tlDrag.end;
      if (!a) return;
      var d1 = a < b ? a : b, d2 = a < b ? b : a;
      if (F.dateFrom === d1 && F.dateTo === d2) { F.dateFrom = ''; F.dateTo = ''; }
      else { F.dateFrom = d1; F.dateTo = d2; }
      page = 0; triggerRender();
    });

    function highlightTlRange(a, b) {
      var d1 = a < b ? a : b, d2 = a < b ? b : a;
      document.querySelectorAll('.tl-bar-group[data-date]').forEach(function (el) {
        var d = el.getAttribute('data-date'), inR = d >= d1 && d <= d2;
        var isF = d === d1, isL = d === d2, isS = isF && isL;
        if (!inR) { el.style.cssText = ''; return; }
        var s = 'background:var(--acd2);';
        if      (isS)  s += 'border-radius:4px;border:2px solid var(--ac);';
        else if (isF)  s += 'border-radius:4px 0 0 4px;border:2px solid var(--ac);border-right:none;';
        else if (isL)  s += 'border-radius:0 4px 4px 0;border:2px solid var(--ac);border-left:none;';
        else           s += 'border-top:2px solid var(--ac);border-bottom:2px solid var(--ac);';
        el.style.cssText = s;
      });
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════════════════

  initEvents();

  if (serverMode) {
    // Load metadata first (dropdowns), then trigger first data fetch
    fetch(apiBase + '/api/meta')
      .then(function (r) { return r.json(); })
      .then(function (meta) {
        serverMeta = meta;
        fetchAndRender();
      })
      .catch(function () {
        document.getElementById('app').innerHTML =
          "<div class='empty' style='color:var(--del);padding:60px'>"
          + "Could not connect to the LogViewer server.<br>"
          + "<span style='font-size:11px;color:var(--tx3)'>Make sure LogViewer.ps1 is still running.</span>"
          + "</div>";
      });
  } else {
    render();
  }

}());
  </script>
</body>
</html>
