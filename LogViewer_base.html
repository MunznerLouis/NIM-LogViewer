<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usercube LogViewer</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg:    #f7f5f2;
      --card:  #ffffff;
      --card2: #faf8f5;
      --hover: #f0eef8;
      --brd:   #e4e0db;
      --brd2:  #d0cbc4;
      --tx:    #1a1535;
      --tx2:   #5c5775;
      --tx3:   #9490a5;
      --ac:    #5B47E0;
      --ac2:   #4B3CC5;
      --acd:   rgba(91, 71, 224, .08);
      --acd2:  rgba(91, 71, 224, .15);
      --add:   #16a34a;
      --addbg: #dcfce7;
      --mod:   #ca8a04;
      --modbg: #fef9c3;
      --del:   #dc2626;
      --delbg: #fee2e2;
      --fn:    'Segoe UI', system-ui, sans-serif;
      --mo:    Consolas, 'Courier New', monospace;
      --r:     6px;
    }

    /* ── Reset & base ──────────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--tx); font-family: var(--fn); line-height: 1.5; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 3px; }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .app { max-width: 1560px; margin: 0 auto; padding: 16px 20px; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .hdr {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 2px solid var(--ac);
    }
    .logo {
      width: 34px; height: 34px; border-radius: var(--r);
      background: var(--ac); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 13px;
      color: #fff; flex-shrink: 0;
    }
    .hdr h1     { font-size: 18px; font-weight: 700; color: var(--ac); }
    .hdr-sub    { font-size: 10px; color: var(--tx3); margin-top: 1px; }
    .hdr-right  { display: flex; gap: 8px; margin-left: auto; align-items: center; }
    .hdr-stats  { display: flex; gap: 14px; font-size: 11px; font-family: var(--mo); color: var(--tx2); }
    .hdr-stats span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    /* ── Buttons ───────────────────────────────────────────────────────────── */
    .btn-ex {
      background: var(--acd); border: 1px solid var(--ac); border-radius: var(--r);
      padding: 5px 10px; cursor: pointer; color: var(--ac);
      font-size: 11px; font-family: var(--mo); font-weight: 600;
      transition: background .12s; display: flex; align-items: center; gap: 4px;
    }
    .btn-ex:hover { background: var(--acd2); }

    /* ── Tabs ──────────────────────────────────────────────────────────────── */
    .tabs { display: flex; margin-bottom: 16px; border-bottom: 2px solid var(--brd); }
    .tab {
      padding: 8px 18px; font-size: 12px; font-weight: 600;
      color: var(--tx3); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .12s;
    }
    .tab:hover { color: var(--tx2); }
    .tab.active { color: var(--ac); border-bottom-color: var(--ac); }

    /* ── Stats cards ───────────────────────────────────────────────────────── */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--brd);
      border-radius: var(--r); padding: 12px 14px; transition: border-color .12s;
    }
    .stat-card:hover { border-color: var(--ac); }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .8px; color: var(--tx3); margin-bottom: 2px; }
    .stat-value { font-size: 22px; font-weight: 700; font-family: var(--mo); }
    .stat-sub   { font-size: 10px; color: var(--tx3); margin-top: 1px; }

    /* ── Timeline ──────────────────────────────────────────────────────────── */
    .timeline {
      background: var(--card); border: 1px solid var(--brd);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px;
    }
    .timeline h2 { font-size: 12px; font-weight: 600; margin-bottom: 10px; color: var(--tx2); }
    .timeline-chart {
      display: flex; align-items: flex-end; gap: 3px;
      height: 100px; overflow-x: auto; padding-bottom: 28px; position: relative;
    }
    .tl-bar-group {
      display: flex; flex-direction: column; align-items: center;
      min-width: 32px; flex: 1; position: relative;
      cursor: pointer; height: 100%; justify-content: flex-end;
    }
    .tl-bars  { display: flex; flex-direction: column; width: 100%; gap: 1px; }
    .tl-bar   { width: 100%; border-radius: 2px 2px 0 0; min-height: 1px; }
    .tl-date-label {
      position: absolute; bottom: -24px; font-size: 10px;
      font-family: var(--mo); color: var(--tx2); white-space: nowrap; font-weight: 500;
    }
    .tl-tooltip {
      display: none; position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      background: var(--card2); border: 1px solid var(--brd); border-radius: 4px;
      padding: 3px 8px; font-family: var(--mo);
      white-space: nowrap; z-index: 100; pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .tl-bar-group:hover .tl-tooltip { display: block; }

    /* ── Table ─────────────────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--card); border: 1px solid var(--brd);
      border-radius: var(--r); overflow: hidden; margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    thead th {
      text-align: left; padding: 7px 8px; font-size: 9px;
      text-transform: uppercase; letter-spacing: .7px; color: var(--tx3);
      font-weight: 600; background: var(--card2); cursor: pointer;
      user-select: none; white-space: nowrap; border-bottom: 1px solid var(--brd);
    }
    thead th:hover { color: var(--ac); }

    /* ── Filter panel ──────────────────────────────────────────────────────── */
    .fp {
      background: var(--card); border: 1px solid var(--brd); border-radius: var(--r);
      padding: 10px 14px 12px; margin-bottom: 12px;
    }
    .fp-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .fp-title { font-size: 10px; font-weight: 700; color: var(--tx2); text-transform: uppercase; letter-spacing: .06em; }
    .fp-badge {
      font-size: 9px; font-weight: 700; font-family: var(--mo);
      background: var(--ac); color: #fff; padding: 1px 6px; border-radius: 10px; display: none;
    }
    .fp-badge.visible { display: inline; }
    .btn-reset {
      margin-left: auto; font-size: 10px; font-family: var(--mo); color: var(--tx3);
      cursor: pointer; background: none; border: none; padding: 2px 6px;
      border-radius: 4px; transition: color .1s;
    }
    .btn-reset:hover { color: var(--del); }
    .fp-rows { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
    .fp-group { display: flex; flex-direction: column; gap: 4px; }
    .fp-group.wide { flex: 1; min-width: 140px; max-width: 200px; }
    .fp-lbl { font-size: 9px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .05em; }
    .fp-group select, .fp-group input[type='text'],
    .fp-group input[type='date'], .fp-group input[type='number'] {
      background: var(--bg); border: 1px solid var(--brd); color: var(--tx);
      padding: 4px 7px; border-radius: 4px; font-family: var(--mo); font-size: 11px;
      outline: none; width: 100%; box-sizing: border-box;
    }
    .fp-group select:focus, .fp-group input:focus { border-color: var(--ac); }
    .fp-range { display: flex; align-items: center; gap: 5px; }
    .fp-range input { flex: 1; width: 0; }
    .fp-range-sep { color: var(--tx3); font-size: 10px; }
    .fp-minmax { display: flex; gap: 4px; }
    .fp-minmax input[type='number'] { width: 36px; flex: none; -moz-appearance: textfield; }
    .fp-minmax input[type='number']::-webkit-inner-spin-button,
    .fp-minmax input[type='number']::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .fp-vsep { width: 1px; background: var(--brd); align-self: stretch; margin: 0 2px; }
    .fp-section { border-top: 1px solid var(--brd); margin-top: 10px; padding-top: 6px; }
    .fp-section-hdr {
      display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none;
      font-size: 10px; font-weight: 700; color: var(--tx2); text-transform: uppercase;
      letter-spacing: .05em; padding: 2px 0;
    }
    .fp-section-hdr:hover { color: var(--ac); }
    .fp-section-hdr:hover .fp-arrow { color: var(--ac); }
    .fp-arrow { font-size: 9px; color: var(--tx3); width: 10px; display: inline-block; }
    .fp-section-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--ac);
      margin-left: 4px; display: none; flex-shrink: 0;
    }
    .fp-section-dot.visible { display: inline-block; }
    .fp-section-body { padding-top: 8px; }
    .ct-toggles { display: flex; gap: 4px; flex-wrap: wrap; }
    .ct-toggle {
      padding: 3px 10px; border: 1px solid var(--brd2); background: var(--bg);
      color: var(--tx3); font-size: 10px; font-weight: 600; font-family: var(--mo);
      cursor: pointer; border-radius: 20px; transition: all .12s; white-space: nowrap;
      user-select: none;
    }
    .ct-toggle.active-add { background: var(--addbg); border-color: var(--add); color: var(--add); }
    .ct-toggle.active-mod { background: var(--modbg); border-color: var(--mod); color: var(--mod); }
    .ct-toggle.active-del { background: var(--delbg); border-color: var(--del); color: var(--del); }

    tbody tr { border-bottom: 1px solid var(--brd); transition: background .1s; cursor: pointer; }
    tbody tr:hover { background: var(--hover); }
    td { padding: 7px 8px; font-family: var(--mo); font-size: 11px; vertical-align: top; }

    /* ── Badges ────────────────────────────────────────────────────────────── */
    .badge     { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .badge-add { background: var(--addbg); color: var(--add); }
    .badge-mod { background: var(--modbg); color: var(--mod); }
    .badge-del { background: var(--delbg); color: var(--del); }

    /* ── Entity tag ────────────────────────────────────────────────────────── */
    .et-tag {
      background: var(--acd); color: var(--ac); padding: 1px 6px;
      border-radius: 3px; font-size: 10px; font-family: var(--mo);
      display: inline-block; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Detail row ────────────────────────────────────────────────────────── */
    .det      { padding: 12px 14px; background: var(--card2); border-top: 1px solid var(--brd); }
    .det-meta { font-size: 10px; color: var(--tx3); margin-bottom: 8px; }

    .changes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 5px; }
    .change-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 8px; border-radius: 4px;
      background: var(--card); border: 1px solid var(--brd);
      font-family: var(--mo); font-size: 11px;
    }
    .change-item.hl { border-left: 3px solid var(--ac); background: var(--acd); }
    .change-key { color: var(--tx3); }
    .change-val {
      color: var(--tx); font-weight: 500; text-align: right;
      word-break: break-all;
    }
    .change-val.null-val { color: var(--tx3); font-style: italic; }
    mark { background: var(--acd2); color: var(--ac); border-radius: 2px; padding: 0 2px; }

    /* ── Roles ─────────────────────────────────────────────────────────────── */
    .roles-list  { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .roles-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 3px; }
    .role-chip   { padding: 2px 7px; border-radius: 3px; font-size: 10px; font-family: var(--mo); border: 1px solid; }
    .role-add    { background: var(--addbg); color: var(--add); border-color: var(--add); }
    .role-rem    { background: var(--delbg); color: var(--del); border-color: var(--del); }
    .role-unk    { background: var(--acd);   color: var(--tx2); border-color: var(--brd); }

    /* ── Owner button & modal ──────────────────────────────────────────────── */
    .btn-owner, .btn-resource {
      display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; margin-right: 6px;
      padding: 4px 10px; background: var(--acd); color: var(--ac);
      border: 1px solid var(--ac); border-radius: var(--r);
      font-size: 10px; font-family: var(--mo); cursor: pointer; font-weight: 600;
    }
    .btn-owner:hover, .btn-resource:hover { background: var(--acd2); }
    .btn-inline { margin-top: 0 !important; padding: 2px 7px; font-size: 9px; }

    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 8px; padding: 20px;
      width: 620px; max-width: 95vw; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 16px 40px rgba(0,0,0,.2); border: 1px solid var(--brd);
    }
    .modal h2   { font-size: 15px; font-weight: 700; color: var(--ac); margin-bottom: 4px; }
    .modal-sub  { font-size: 11px; color: var(--tx2); margin-bottom: 12px; font-family: var(--mo); }
    .owner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .owner-item {
      display: flex; flex-direction: column; padding: 5px 8px;
      border-radius: 4px; background: var(--card2); border: 1px solid var(--brd);
      font-family: var(--mo); font-size: 11px;
    }
    .owner-key { font-size: 9px; color: var(--tx3); text-transform: uppercase; letter-spacing: .5px; }
    .owner-val { color: var(--tx); font-weight: 500; word-break: break-all; }
    .owner-val.null-val { color: var(--tx3); font-style: italic; font-weight: 400; }
    .obj-toggle { background: var(--card2); border: 1px solid var(--brd); border-radius: 3px; color: var(--tx2); }

    .btn-modal-close {
      display: block; margin-top: 12px; padding: 6px 16px;
      background: var(--acd); color: var(--ac); border: 1px solid var(--ac);
      border-radius: var(--r); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--mo);
    }
    .btn-modal-close:hover { background: var(--acd2); }

    /* ── Pagination ────────────────────────────────────────────────────────── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-top: 1px solid var(--brd);
      font-size: 11px; color: var(--tx3); font-family: var(--mo);
    }
    .pagination button {
      background: var(--card); border: 1px solid var(--brd); color: var(--tx);
      padding: 4px 10px; border-radius: var(--r); cursor: pointer;
      font-family: var(--mo); font-size: 11px;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--ac); color: var(--ac); }
    .pagination button:disabled { opacity: .3; cursor: default; }
    .page-btns { display: flex; gap: 2px; }
    .empty { text-align: center; padding: 30px; color: var(--tx3); font-size: 13px; }

    /* ── Owner Lifecycle tab ───────────────────────────────────────────────── */
    .lc-search-box { position: relative; margin-bottom: 10px; }
    .lc-search-box input {
      background: var(--card); border: 1px solid var(--brd); color: var(--tx);
      padding: 8px 12px; border-radius: var(--r);
      font-family: var(--mo); font-size: 13px; width: 300px; outline: none;
    }
    .lc-search-box input:focus { border-color: var(--ac); }
    .lc-suggestions {
      background: var(--card); border: 1px solid var(--brd);
      border-radius: var(--r); width: 340px; max-height: 220px; overflow-y: auto;
      box-shadow: 0 6px 20px rgba(0,0,0,.3); margin-top: 4px;
    }
    .lc-sug-item {
      padding: 7px 12px; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .lc-sug-item:hover { background: var(--hover); }
    .lc-sug-item.sug-sel { color: var(--ac); }
    .lc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .lc-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 8px 4px 11px; border-radius: 14px;
      font-size: 11px; font-weight: 600; border: 1.5px solid;
    }
    .lc-chip-rm {
      background: none; border: none; cursor: pointer; padding: 0 0 0 2px;
      color: inherit; opacity: .6; font-size: 16px; line-height: 1;
    }
    .lc-chip-rm:hover { opacity: 1; }
    .lc-compare {
      background: var(--card); border: 1px solid var(--brd);
      border-radius: var(--r); padding: 16px 16px 10px;
    }
    .lc-tl-owner-row { margin-bottom: 2px; }
    .lc-tl-row { display: flex; align-items: center; gap: 12px; padding: 5px 0; }
    .lc-tl-label {
      width: 150px; flex-shrink: 0; font-size: 11px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .lc-tl-track { flex: 1; position: relative; height: 36px; }
    .lc-tl-line {
      position: absolute; top: 50%; left: 0; right: 0;
      height: 2px; transform: translateY(-50%); border-radius: 1px;
    }
    .lc-node {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      cursor: pointer; padding: 7px; z-index: 2;
    }
    .lc-node-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--bg);
      transition: transform .12s, box-shadow .12s;
    }
    .lc-node.multi .lc-node-dot {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #fff;
    }
    .lc-node:hover .lc-node-dot { transform: scale(1.5); }
    .lc-node.lc-node-active .lc-node-dot { transform: scale(1.35); }
    .lc-node-panel {
      display: flex; gap: 12px;
      background: var(--card2); border: 1px solid var(--brd);
      border-radius: 4px; margin: 0 0 8px 0; padding: 10px 14px 12px;
    }
    .lc-node-panel-spacer { width: 150px; flex-shrink: 0; }
    .lc-node-panel-body { flex: 1; min-width: 0; }
    .lc-prow {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 4px; font-family: var(--mo); font-size: 11px;
      cursor: pointer; user-select: none; border-radius: 3px;
    }
    .lc-prow:hover { background: var(--hover); }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .app { padding: 10px; }
      .hdr-stats { display: none; }
      .owner-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="app" id="app"></div>
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Data injected by LogViewer.ps1 (file mode) or replaced with null (serve mode) -->
  <script>window.__RAW_DATA__ = __DATA_PLACEHOLDER__;</script>

  <script>
(function () {
  'use strict';

  // ═══════════════════════════════════════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════════════════════════════════════

  var PAGE_SIZE = 50;

  // ═══════════════════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════════════════

  var page      = 0;
  var sortCol   = 'fileDate';
  var sortDir   = 'desc';
  var activeTab = 'orders';
  var expanded  = {};
  var lcExpanded    = {};   // kept for legacy safety
  var lcRecordCache = [];
  var lcSelected    = [];   // ordered array of owner keys
  var lcOwnerData   = {};   // key -> { name, id, orders, color }
  var lcActiveOwner   = null; // null | ownerKey — which owner's orders are shown
  var lcPanelExpanded = {};   // stable key -> bool, per-row expand in the panel
  var LC_PALETTE    = ['#5b8af5','#f5855b','#5bc87a','#f5c95b','#c75bf5','#5be8f5','#f55b8a','#a8a8f8'];

  function hexToRgba(hex, a) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  var F = {
    sourceEntity:    '__all__',
    targetEntity:    '__all__',
    changeTypes:     { Added: true, Modified: true, Deleted: true },
    search:          '',
    dateFrom:        '',
    dateTo:          '',
    ownerName:          '',
    ownerIdentifier:    '',
    ownerAttr:          '__all__',
    ownerAttrValue:     '',
    resourceName:       '',
    resourceIdentifier: '',
    resourceAttr:       '__all__',
    resourceAttrValue:  '',
    changesMin:      '',
    changesMax:      '',
    changesAttr:     '__all__',
    changesValue:    '',
    rolesMin:        '',
    rolesMax:        '',
    rolesDir:        '__all__',
    rolesValue:      '',
    lifecycleSearch: ''
  };

  // Collapsible filter section state (persists across renders)
  var sectionOpen = { entity: true, owner: false, target: false, changes: false };

  function sectionHasActive(key) {
    if (key === 'entity')  return F.sourceEntity !== '__all__' || F.targetEntity !== '__all__';
    if (key === 'owner')   return !!F.ownerName || !!F.ownerIdentifier
                               || (F.ownerAttr && F.ownerAttr !== '__all__') || !!F.ownerAttrValue;
    if (key === 'target')  return !!F.resourceName || !!F.resourceIdentifier
                               || (F.resourceAttr && F.resourceAttr !== '__all__') || !!F.resourceAttrValue;
    if (key === 'changes') return !!F.changesMin || !!F.changesMax
                               || (F.changesAttr && F.changesAttr !== '__all__')
                               || !!F.changesValue || F.rolesDir !== '__all__'
                               || !!F.rolesMin || !!F.rolesMax || !!F.rolesValue;
    return false;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // MODE — file (embedded data) vs. serve (fetch from PS1 HTTP server)
  // ═══════════════════════════════════════════════════════════════════════════

  var serverMode = (window.__RAW_DATA__ === null);
  var apiBase    = serverMode ? (window.__API_BASE__ || '') : '';

  // File mode: full dataset in memory
  var data = serverMode ? [] : (Array.isArray(window.__RAW_DATA__) ? window.__RAW_DATA__ : []);

  // Server mode: last responses from the API
  var serverResult    = null;   // /api/query response
  var serverLifecycle = null;   // /api/lifecycle response
  var serverMeta      = { sourceEntities: [], targetEntities: [], entityLinks: { s2t: {}, t2s: {} } };
  var fetchSeq        = 0;      // discard stale responses

  // ═══════════════════════════════════════════════════════════════════════════
  // SERVER MODE — fetch helpers
  // ═══════════════════════════════════════════════════════════════════════════

  function triggerRender() {
    if (!serverMode) { render(); return; }
    if (activeTab === 'lifecycle') { fetchLifecycle(); } else { fetchAndRender(); }
  }

  function fetchAndRender() {
    var seq = ++fetchSeq;
    fetch(apiBase + '/api/query?' + buildQueryParams())
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (seq !== fetchSeq) return;
        serverResult = result;
        render();
      })
      .catch(function () {
        if (seq !== fetchSeq) return;
        var el = document.getElementById('app');
        if (el) el.innerHTML += "<div class='empty' style='color:var(--del)'>Could not reach server. Is LogViewer.ps1 still running?</div>";
      });
  }

  function fetchLifecycle() {
    if (!F.lifecycleSearch || F.lifecycleSearch.length < 2) {
      serverLifecycle = { owners: [], total: 0, truncated: false };
      render();
      return;
    }
    var seq = ++fetchSeq;
    fetch(apiBase + '/api/lifecycle?search=' + encodeURIComponent(F.lifecycleSearch))
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (seq !== fetchSeq) return;
        serverLifecycle = result;
        render();
      });
  }

  function buildQueryParams() {
    var p = [];
    p.push('page=' + page);
    p.push('pageSize=' + PAGE_SIZE);
    p.push('sortCol=' + encodeURIComponent(sortCol));
    p.push('sortDir=' + sortDir);
    if (F.sourceEntity !== '__all__') p.push('sourceEntity=' + encodeURIComponent(F.sourceEntity));
    if (F.targetEntity !== '__all__') p.push('targetEntity=' + encodeURIComponent(F.targetEntity));
    var ctOn = [];
    ['Added', 'Modified', 'Deleted'].forEach(function (ct) { if (F.changeTypes[ct]) ctOn.push(ct); });
    p.push('changeTypes=' + ctOn.join(','));
    if (F.search)           p.push('search='          + encodeURIComponent(F.search));
    if (F.ownerName)          p.push('ownerName='          + encodeURIComponent(F.ownerName));
    if (F.ownerIdentifier)    p.push('ownerIdentifier='    + encodeURIComponent(F.ownerIdentifier));
    if (F.ownerAttr && F.ownerAttr !== '__all__') p.push('ownerAttr=' + encodeURIComponent(F.ownerAttr));
    if (F.ownerAttrValue)     p.push('ownerAttrValue='     + encodeURIComponent(F.ownerAttrValue));
    if (F.resourceName)       p.push('resourceName='       + encodeURIComponent(F.resourceName));
    if (F.resourceIdentifier) p.push('resourceIdentifier=' + encodeURIComponent(F.resourceIdentifier));
    if (F.resourceAttr && F.resourceAttr !== '__all__') p.push('resourceAttr=' + encodeURIComponent(F.resourceAttr));
    if (F.resourceAttrValue)  p.push('resourceAttrValue='  + encodeURIComponent(F.resourceAttrValue));
    if (F.dateFrom)         p.push('dateFrom='        + F.dateFrom);
    if (F.dateTo)       p.push('dateTo='       + F.dateTo);
    if (F.changesMin)   p.push('changesMin='   + F.changesMin);
    if (F.changesMax)   p.push('changesMax='   + F.changesMax);
    if (F.changesAttr && F.changesAttr !== '__all__') p.push('changesAttr=' + encodeURIComponent(F.changesAttr));
    if (F.changesValue) p.push('changesValue=' + encodeURIComponent(F.changesValue));
    if (F.rolesMin)     p.push('rolesMin='     + F.rolesMin);
    if (F.rolesMax)     p.push('rolesMax='     + F.rolesMax);
    if (F.rolesDir !== '__all__') p.push('rolesDir=' + F.rolesDir);
    if (F.rolesValue) p.push('rolesValue=' + encodeURIComponent(F.rolesValue));
    return p.join('&');
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // FILE MODE — local data queries
  // ═══════════════════════════════════════════════════════════════════════════

  function getUniqueValues(key) {
    var seen = {};
    data.forEach(function (d) { seen[d[key] || 'Unknown'] = 1; });
    return Object.keys(seen).sort();
  }

  function getEntityLinks() {
    var s2t = {}, t2s = {};
    data.forEach(function (d) {
      var s = d.sourceEntity || 'Unknown', t = d.targetEntity || 'Unknown';
      if (!s2t[s]) s2t[s] = {};
      if (!t2s[t]) t2s[t] = {};
      s2t[s][t] = 1; t2s[t][s] = 1;
    });
    return { s2t: s2t, t2s: t2s };
  }

  function getFilteredAttrs() {
    if (F.targetEntity === '__all__') return [];
    var seen = {};
    data.forEach(function (d) {
      if ((d.targetEntity || 'Unknown') !== F.targetEntity) return;
      if (F.sourceEntity !== '__all__' && (d.sourceEntity || 'Unknown') !== F.sourceEntity) return;
      var ch = d.changes || {};
      for (var k in ch) seen[k] = 1;
    });
    return Object.keys(seen).sort();
  }

  function getOwnerAttrs() {
    var seen = {};
    data.forEach(function (d) { var o = d.owner || {}; for (var k in o) seen[k] = 1; });
    return Object.keys(seen).sort();
  }

  function getResourceAttrs() {
    var seen = {};
    data.forEach(function (d) { var r = d.resource || {}; for (var k in r) seen[k] = 1; });
    return Object.keys(seen).sort();
  }

  function countRoles(roles) {
    if (!roles || !roles.length) return 0;
    if (F.rolesDir === '__all__') return roles.length;
    return roles.filter(function (r) { return r.direction === F.rolesDir; }).length;
  }

  function matchChangesValue(d) {
    if (!F.changesValue) return true;
    var ch = d.changes || {}, q = F.changesValue.toLowerCase();
    function valStr(v) { return v == null ? 'null' : String(v); }
    // When an attribute is selected, scope the value search to that attribute only
    if (F.changesAttr && F.changesAttr !== '__all__') {
      return ch.hasOwnProperty(F.changesAttr) && valStr(ch[F.changesAttr]).toLowerCase().indexOf(q) >= 0;
    }
    for (var k in ch) {
      if (valStr(ch[k]).toLowerCase().indexOf(q) >= 0) return true;
    }
    return false;
  }

  function getFiltered() {
    return data.filter(function (d) {
      if (F.sourceEntity !== '__all__' && (d.sourceEntity || 'Unknown') !== F.sourceEntity) return false;
      if (F.targetEntity !== '__all__' && (d.targetEntity || 'Unknown') !== F.targetEntity) return false;
      var norm = (d.changeType || '');
      norm = norm.charAt(0).toUpperCase() + norm.slice(1).toLowerCase();
      if (!F.changeTypes[norm]) return false;
      if (F.search) {
        var q = F.search.toLowerCase();
        var hay = [d.ownerName, d.ownerIdentifier, d.fileName,
                   d.sourceEntity, d.targetEntity, d.resourceType, d.resourceTypeDir]
          .filter(Boolean).join(' ').toLowerCase();
        if (hay.indexOf(q) < 0) return false;
      }
      if (F.dateFrom && d.fileDate && d.fileDate < F.dateFrom) return false;
      if (F.dateTo   && d.fileDate && d.fileDate > F.dateTo + 'T23:59:59') return false;
      if (F.ownerName          && (d.ownerName             || '').toLowerCase().indexOf(F.ownerName.toLowerCase())          < 0) return false;
      if (F.ownerIdentifier    && (d.ownerIdentifier       || '').toLowerCase().indexOf(F.ownerIdentifier.toLowerCase())    < 0) return false;
      if (F.ownerAttr && F.ownerAttr !== '__all__') {
        var oo = d.owner || {};
        if (!(F.ownerAttr in oo)) return false;
        if (F.ownerAttrValue) {
          var ov = oo[F.ownerAttr];
          if (ov == null || String(ov).toLowerCase().indexOf(F.ownerAttrValue.toLowerCase()) < 0) return false;
        }
      } else if (F.ownerAttrValue) {
        var oo = d.owner || {}, oFound = false, oq = F.ownerAttrValue.toLowerCase();
        for (var ok in oo) { if (oo[ok] != null && String(oo[ok]).toLowerCase().indexOf(oq) >= 0) { oFound = true; break; } }
        if (!oFound) return false;
      }
      if (F.resourceName       && (d.resourceDisplayName   || '').toLowerCase().indexOf(F.resourceName.toLowerCase())       < 0) return false;
      if (F.resourceIdentifier && (d.resourceIdentifier    || '').toLowerCase().indexOf(F.resourceIdentifier.toLowerCase()) < 0) return false;
      if (F.resourceAttr && F.resourceAttr !== '__all__') {
        var ro = d.resource || {};
        if (!(F.resourceAttr in ro)) return false;
        if (F.resourceAttrValue) {
          var rv = ro[F.resourceAttr];
          if (rv == null || String(rv).toLowerCase().indexOf(F.resourceAttrValue.toLowerCase()) < 0) return false;
        }
      } else if (F.resourceAttrValue) {
        var ro = d.resource || {}, rFound = false, rq = F.resourceAttrValue.toLowerCase();
        for (var rk in ro) { if (ro[rk] != null && String(ro[rk]).toLowerCase().indexOf(rq) >= 0) { rFound = true; break; } }
        if (!rFound) return false;
      }
      var nch = Object.keys(d.changes || {}).length;
      if (F.changesMin !== '' && nch < parseInt(F.changesMin, 10)) return false;
      if (F.changesMax !== '' && nch > parseInt(F.changesMax, 10)) return false;
      if (F.changesAttr && F.changesAttr !== '__all__' && !(F.changesAttr in (d.changes || {}))) return false;
      if (!matchChangesValue(d)) return false;
      var nrl = countRoles(d.roles);
      if (F.rolesDir !== '__all__' && nrl === 0) return false;
      if (F.rolesMin !== '' && nrl < parseInt(F.rolesMin, 10)) return false;
      if (F.rolesMax !== '' && nrl > parseInt(F.rolesMax, 10)) return false;
      if (F.rolesValue) {
        var rq = F.rolesValue.toLowerCase();
        var roles = d.roles || [];
        var rMatch = roles.some(function (r) {
          if (F.rolesDir !== '__all__' && r.direction !== F.rolesDir) return false;
          return r.name && r.name.toLowerCase().indexOf(rq) >= 0;
        });
        if (!rMatch) return false;
      }
      return true;
    }).sort(function (a, b) {
      var va, vb;
      if (sortCol === 'changesCount') { va = Object.keys(a.changes || {}).length; vb = Object.keys(b.changes || {}).length; }
      else if (sortCol === 'rolesCount') { va = countRoles(a.roles); vb = countRoles(b.roles); }
      else { va = a[sortCol] || ''; vb = b[sortCol] || ''; if (typeof va === 'string') va = va.toLowerCase(); if (typeof vb === 'string') vb = vb.toLowerCase(); }
      if (va < vb) return sortDir === 'asc' ? -1 :  1;
      if (va > vb) return sortDir === 'asc' ?  1 : -1;
      return 0;
    });
  }

  function getStats(filtered) {
    var s = { total: filtered.length, added: 0, modified: 0, deleted: 0, rtSeen: {} };
    filtered.forEach(function (d) {
      var ct = (d.changeType || '').toLowerCase();
      if      (ct === 'added')    s.added++;
      else if (ct === 'modified') s.modified++;
      else if (ct === 'deleted')  s.deleted++;
      s.rtSeen[d.resourceType || d.resourceTypeDir || '?'] = 1;
    });
    s.rtCount = Object.keys(s.rtSeen).length;
    return s;
  }

  function getTimeline(filtered) {
    var map = {};
    filtered.forEach(function (d) {
      var dk = d.fileDate ? d.fileDate.substring(0, 10) : '?';
      if (!map[dk]) map[dk] = { added: 0, modified: 0, deleted: 0 };
      var ct = (d.changeType || '').toLowerCase();
      if      (ct === 'added')    map[dk].added++;
      else if (ct === 'modified') map[dk].modified++;
      else if (ct === 'deleted')  map[dk].deleted++;
    });
    return Object.keys(map).sort().map(function (k) {
      var v = map[k];
      return { date: k, added: v.added, modified: v.modified, deleted: v.deleted, total: v.added + v.modified + v.deleted };
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // EXPORT
  // ═══════════════════════════════════════════════════════════════════════════

  function exportCSV() {
    var fl   = serverMode ? (serverResult ? serverResult.records : []) : getFiltered();
    var rows = [['Date','Type','Source','Target','Owner','Identifier','Changes','RolesAdd','RolesRemove','File','ResourceType']];
    fl.forEach(function (d) {
      var ch    = d.changes || {}, roles = d.roles || [];
      var ra = roles.filter(function (r) { return r.direction === 'add';    }).map(function (r) { return r.name; }).join('; ');
      var rr = roles.filter(function (r) { return r.direction === 'remove'; }).map(function (r) { return r.name; }).join('; ');
      var cs = Object.keys(ch).map(function (k) { return k + '=' + ch[k]; }).join('; ');
      rows.push([fmtDate(d.fileDate), d.changeType || '', d.sourceEntity || '',
                 d.targetEntity || '', d.ownerName || '', d.ownerIdentifier || '',
                 cs, ra, rr, d.fileName || '', d.resourceType || d.resourceTypeDir || '']);
    });
    var csv = rows.map(function (r) {
      return r.map(function (c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(';');
    }).join('\n');
    var now = new Date();
    var ts  = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2)
            + '_' + ('0'+now.getHours()).slice(-2) + '-' + ('0'+now.getMinutes()).slice(-2) + '-' + ('0'+now.getSeconds()).slice(-2);
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }));
    a.download = 'provisioning_export_' + ts + '.csv';
    a.click();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // UTILITIES
  // ═══════════════════════════════════════════════════════════════════════════

  function esc(s) {
    if (s == null) return '';
    var str = String(s), o = '';
    for (var i = 0; i < str.length; i++) {
      var c = str[i];
      if      (c === '&')  o += '&amp;';
      else if (c === '<')  o += '&lt;';
      else if (c === '>')  o += '&gt;';
      else if (c === '"')  o += '&quot;';
      else if (c === "'")  o += '&#39;';
      else                 o += c;
    }
    return o;
  }

  function escHL(s, q) {
    if (!q || s == null) return esc(s);
    var str = String(s), sl = str.toLowerCase(), ql = q.toLowerCase(), o = '', i = 0;
    while (i < str.length) {
      var idx = sl.indexOf(ql, i);
      if (idx < 0) { o += esc(str.substring(i)); break; }
      o += esc(str.substring(i, idx)) + '<mark>' + esc(str.substring(idx, idx + ql.length)) + '</mark>';
      i = idx + ql.length;
    }
    return o;
  }

  function fmtDate(iso) {
    if (!iso) return '\u2014';
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' })
           + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso; }
  }

  function fmtDateShort(iso) {
    if (!iso) return '?';
    try { return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
    catch (e) { return iso; }
  }

  function badgeClass(ct) {
    var c = (ct || '').toLowerCase();
    return c === 'added' ? 'badge-add' : c === 'deleted' ? 'badge-del' : 'badge-mod';
  }

  function sortArrow(col) {
    return sortCol === col ? (sortDir === 'asc' ? ' \u25B2' : ' \u25BC') : '';
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // HTML BUILDERS
  // ═══════════════════════════════════════════════════════════════════════════

  function buildHeader(total, stats) {
    var h = "<div class='hdr'>"
          + "<div class='logo'>UC</div>"
          + "<div><h1>Provisioning LogViewer</h1><div class='hdr-sub'>Netwrix Identity Manager"
          + (serverMode ? " \u2014 <span style='color:var(--add);font-size:9px'>LIVE</span>" : '')
          + "</div></div>"
          + "<div class='hdr-right'>"
          + "<div class='hdr-stats'>"
          + "<span><span class='dot' style='background:var(--add)'></span>" + (stats.added    || 0) + "</span>"
          + "<span><span class='dot' style='background:var(--mod)'></span>" + (stats.modified || 0) + "</span>"
          + "<span><span class='dot' style='background:var(--del)'></span>" + (stats.deleted  || 0) + "</span>"
          + "</div>";
    if (activeTab === 'orders') {
      h += "<button class='btn-ex' id='btnExport'>&#x2B07; Export"
        + (serverMode ? " page" : " filtered (" + total + ")") + "</button>";
    }
    h += "</div></div>";
    return h;
  }

  function buildTabs() {
    var defs = [['orders', 'Orders'], ['lifecycle', 'Owner Lifecycle']];
    var h = "<div class='tabs'>";
    defs.forEach(function (t) {
      h += "<div class='tab" + (activeTab === t[0] ? ' active' : '') + "' data-tab='" + t[0] + "'>" + t[1] + "</div>";
    });
    return h + "</div>";
  }

  function buildStats(stats) {
    function card(label, value, sub, color) {
      return "<div class='stat-card'><div class='stat-label'>" + label + "</div>"
           + "<div class='stat-value' style='color:" + color + "'>" + (value || 0).toLocaleString() + "</div>"
           + "<div class='stat-sub'>" + sub + "</div></div>";
    }
    var t = stats.total || 0;
    var pct = function (n) { return t > 0 ? (((n || 0) / t) * 100).toFixed(1) + '%' : '0%'; };
    return "<div class='stats-row'>"
         + card('Total',  t,               (stats.rtCount || 0) + ' RT(s)', 'var(--ac)')
         + card('Joiner', stats.added,    pct(stats.added),    'var(--add)')
         + card('Mover',  stats.modified, pct(stats.modified), 'var(--mod)')
         + card('Leaver', stats.deleted,  pct(stats.deleted),  'var(--del)')
         + "</div>";
  }

  function buildTimeline(timeline) {
    if (!timeline || !timeline.length) return '';
    var tlMax = Math.max.apply(null, timeline.map(function (t) { return t.total; }));
    if (tlMax < 1) tlMax = 1;
    var label = '';
    if (F.dateFrom && F.dateTo) {
      label = F.dateFrom === F.dateTo ? ' \u2014 ' + F.dateFrom : ' \u2014 ' + F.dateFrom + ' to ' + F.dateTo;
    }
    var h = "<div class='timeline'><h2 style='user-select:none'>Timeline" + label;
    if (F.dateFrom) h += " <span style='cursor:pointer;font-size:10px;color:var(--ac)' id='tlClear'>(clear)</span>";
    h += "</h2><div class='timeline-chart' id='tlChart'>";
    timeline.forEach(function (t, i) {
      var hPct      = (t.total / tlMax) * 100;
      var showLabel = timeline.length <= 15 || i === 0 || i === timeline.length - 1
                   || i % Math.max(1, Math.ceil(timeline.length / 12)) === 0;
      var inRange   = F.dateFrom && F.dateTo && t.date >= F.dateFrom && t.date <= F.dateTo;
      var isFirst   = inRange && t.date === F.dateFrom;
      var isLast    = inRange && t.date === F.dateTo;
      var isSingle  = isFirst && isLast;
      var rs = '';
      if (inRange) {
        rs = 'background:var(--acd2);';
        if      (isSingle) rs += 'border-radius:4px;border:2px solid var(--ac);';
        else if (isFirst)  rs += 'border-radius:4px 0 0 4px;border:2px solid var(--ac);border-right:none;';
        else if (isLast)   rs += 'border-radius:0 4px 4px 0;border:2px solid var(--ac);border-left:none;';
        else               rs += 'border-top:2px solid var(--ac);border-bottom:2px solid var(--ac);';
      }
      h += "<div class='tl-bar-group' data-date='" + t.date + "' style='" + rs + "'>"
         + "<div class='tl-tooltip'>"
         + "<div style='font-size:13px;font-weight:700;color:var(--ac);letter-spacing:.3px'>" + t.date + "</div>"
         + "<div style='font-size:10px;color:var(--tx3);margin-top:2px'>"
         + "<span style='color:var(--add)'>+" + t.added + "</span>"
         + " <span style='color:var(--mod)'>~" + t.modified + "</span>"
         + " <span style='color:var(--del)'>-" + t.deleted + "</span>"
         + "</div></div>"
         + "<div class='tl-bars' style='height:" + hPct + "%'>";
      if (t.deleted  > 0) h += "<div class='tl-bar' style='background:var(--del);height:" + ((t.deleted  / t.total) * 100) + "%'></div>";
      if (t.modified > 0) h += "<div class='tl-bar' style='background:var(--mod);height:" + ((t.modified / t.total) * 100) + "%'></div>";
      if (t.added    > 0) h += "<div class='tl-bar' style='background:var(--add);height:" + ((t.added    / t.total) * 100) + "%'></div>";
      h += "</div>";
      if (showLabel) h += "<div class='tl-date-label'>" + t.date.substring(5) + "</div>";
      h += "</div>";
    });
    return h + "</div></div>";
  }

  function countActiveFilters() {
    var n = 0;
    if (F.sourceEntity !== '__all__') n++;
    if (F.targetEntity !== '__all__') n++;
    if (F.dateFrom) n++;
    if (F.dateTo) n++;
    if (!F.changeTypes.Added || !F.changeTypes.Modified || !F.changeTypes.Deleted) n++;
    if (F.search) n++;
    if (F.ownerName) n++;
    if (F.ownerIdentifier) n++;
    if (F.ownerAttr && F.ownerAttr !== '__all__') n++;
    if (F.ownerAttrValue) n++;
    if (F.resourceName) n++;
    if (F.resourceIdentifier) n++;
    if (F.resourceAttr && F.resourceAttr !== '__all__') n++;
    if (F.resourceAttrValue) n++;
    if (F.changesMin) n++;
    if (F.changesMax) n++;
    if (F.changesAttr && F.changesAttr !== '__all__') n++;
    if (F.changesValue) n++;
    if (F.rolesDir !== '__all__') n++;
    if (F.rolesMin) n++;
    if (F.rolesMax) n++;
    if (F.rolesValue) n++;
    return n;
  }

  function resetFilters() {
    F.sourceEntity  = '__all__'; F.targetEntity   = '__all__';
    F.dateFrom      = '';        F.dateTo         = '';
    F.changeTypes   = { Added: true, Modified: true, Deleted: true };
    F.search        = '';
    F.ownerName     = '';        F.ownerIdentifier    = '';
    F.ownerAttr     = '__all__'; F.ownerAttrValue     = '';
    F.resourceName  = '';        F.resourceIdentifier = '';
    F.resourceAttr  = '__all__'; F.resourceAttrValue  = '';
    F.changesMin    = '';        F.changesMax      = '';
    F.changesAttr   = '__all__'; F.changesValue    = '';
    F.rolesDir      = '__all__'; F.rolesMin = ''; F.rolesMax = ''; F.rolesValue = '';
    page = 0;
    triggerRender();
  }

  function buildFilterPanel(ses, tes, links, allAttrs, ownerAttrs, resourceAttrs) {
    var active = countActiveFilters();
    var lT = F.sourceEntity !== '__all__' && links.s2t[F.sourceEntity] ? links.s2t[F.sourceEntity] : null;
    var lS = F.targetEntity !== '__all__' && links.t2s[F.targetEntity] ? links.t2s[F.targetEntity] : null;
    var attrDisabled = F.targetEntity === '__all__';

    function secHdr(key, label) {
      var open = sectionOpen[key];
      return "<div class='fp-section-hdr' data-section='" + key + "'>"
           + "<span class='fp-arrow'>" + (open ? '\u25BE' : '\u25B8') + "</span>"
           + "<span>" + label + "</span>"
           + "<span class='fp-section-dot" + (sectionHasActive(key) ? " visible" : "") + "'></span>"
           + "</div>";
    }

    var h = "<div class='fp'>"
          + "<div class='fp-hdr'>"
          + "<span class='fp-title'>Filters</span>"
          + "<span class='fp-badge" + (active > 0 ? " visible" : "") + "'>" + active + " active</span>"
          + "<button class='btn-reset' id='btnReset'>\u2715 Reset</button>"
          + "</div>";

    // ── Basic row (always visible) ──────────────────────────────────────────
    h += "<div class='fp-rows'>";

    h += "<div class='fp-group'><span class='fp-lbl'>Date range</span>"
       + "<div class='fp-range'>"
       + "<input type='date' id='fDateFrom' value='" + F.dateFrom + "'>"
       + "<span class='fp-range-sep'>\u2192</span>"
       + "<input type='date' id='fDateTo' value='" + F.dateTo + "'>"
       + "</div></div>";

    h += "<div class='fp-group wide'><span class='fp-lbl'>Search</span>"
       + "<input type='text' id='fSearch' placeholder='Owner, entity, file\u2026' value='" + esc(F.search) + "'>"
       + "</div>";

    var ctDefs = [['Added','Added','active-add'],['Modified','Modified','active-mod'],['Deleted','Deleted','active-del']];
    h += "<div class='fp-group'><span class='fp-lbl'>Change type</span><div class='ct-toggles'>";
    ctDefs.forEach(function (ct) {
      h += "<span class='ct-toggle" + (F.changeTypes[ct[0]] ? ' ' + ct[2] : '') + "' data-ct='" + ct[0] + "'>" + ct[1] + "</span>";
    });
    h += "</div></div>";

    h += "</div>"; // fp-rows

    // ── Entity section ──────────────────────────────────────────────────────
    h += "<div class='fp-section'>" + secHdr('entity', 'Entity');
    h += "<div class='fp-section-body fp-rows' id='fp-sec-entity' style='display:" + (sectionOpen.entity ? '' : 'none') + "'>";

    h += "<div class='fp-group'><span class='fp-lbl'>Source</span>"
       + "<select id='fSourceEntity'><option value='__all__'>All sources</option>";
    ses.forEach(function (v) {
      var linked = lS ? !!lS[v] : false;
      var style  = lS ? (linked ? " style='font-weight:600'" : " style='color:var(--tx3)'") : '';
      h += "<option value='" + esc(v) + "'" + (F.sourceEntity === v ? ' selected' : '') + style + ">" + (linked ? '\u2714 ' : '') + esc(v) + "</option>";
    });
    h += "</select></div>";

    h += "<div class='fp-group'><span class='fp-lbl'>Target</span>"
       + "<select id='fTargetEntity'><option value='__all__'>All targets</option>";
    tes.forEach(function (v) {
      var linked = lT ? !!lT[v] : false;
      var style  = lT ? (linked ? " style='font-weight:600'" : " style='color:var(--tx3)'") : '';
      h += "<option value='" + esc(v) + "'" + (F.targetEntity === v ? ' selected' : '') + style + ">" + (linked ? '\u2714 ' : '') + esc(v) + "</option>";
    });
    h += "</select></div>";

    h += "</div></div>"; // fp-section-body + fp-section

    // ── Owner section ───────────────────────────────────────────────────────
    h += "<div class='fp-section'>" + secHdr('owner', 'Owner');
    h += "<div class='fp-section-body fp-rows' id='fp-sec-owner' style='display:" + (sectionOpen.owner ? '' : 'none') + "'>";

    h += "<div class='fp-group wide'><span class='fp-lbl'>Name</span>"
       + "<input type='text' id='fOwnerName' placeholder='Filter by name\u2026' value='" + esc(F.ownerName) + "'>"
       + "</div>";

    h += "<div class='fp-group wide'><span class='fp-lbl'>Identifier</span>"
       + "<input type='text' id='fOwnerIdentifier' placeholder='Filter by identifier\u2026' value='" + esc(F.ownerIdentifier) + "'>"
       + "</div>";

    if (ownerAttrs && ownerAttrs.length > 0) {
      var ownerValPlaceholder = (F.ownerAttr && F.ownerAttr !== '__all__')
        ? 'Search in ' + esc(F.ownerAttr) + '\u2026'
        : 'Search any attribute\u2026';
      h += "<div class='fp-group'><span class='fp-lbl'>Attribute</span>"
         + "<select id='fOwnerAttr'>"
         + "<option value='__all__'>Any attribute</option>";
      ownerAttrs.forEach(function (a) { h += "<option value='" + esc(a) + "'" + (F.ownerAttr === a ? ' selected' : '') + ">" + esc(a) + "</option>"; });
      h += "</select>"
         + "<input type='text' id='fOwnerAttrValue' placeholder='" + ownerValPlaceholder + "' value='" + esc(F.ownerAttrValue) + "'>"
         + "</div>";
    }

    h += "</div></div>"; // fp-section-body + fp-section (owner)

    // ── Target section ──────────────────────────────────────────────────────
    h += "<div class='fp-section'>" + secHdr('target', 'Target');
    h += "<div class='fp-section-body fp-rows' id='fp-sec-target' style='display:" + (sectionOpen.target ? '' : 'none') + "'>";

    h += "<div class='fp-group wide'><span class='fp-lbl'>Display name</span>"
       + "<input type='text' id='fResourceName' placeholder='Filter by name\u2026' value='" + esc(F.resourceName) + "'>"
       + "</div>";

    h += "<div class='fp-group wide'><span class='fp-lbl'>Identifier</span>"
       + "<input type='text' id='fResourceIdentifier' placeholder='Filter by identifier\u2026' value='" + esc(F.resourceIdentifier) + "'>"
       + "</div>";

    if (resourceAttrs && resourceAttrs.length > 0) {
      var resourceValPlaceholder = (F.resourceAttr && F.resourceAttr !== '__all__')
        ? 'Search in ' + esc(F.resourceAttr) + '\u2026'
        : 'Search any attribute\u2026';
      h += "<div class='fp-group'><span class='fp-lbl'>Attribute</span>"
         + "<select id='fResourceAttr'>"
         + "<option value='__all__'>Any attribute</option>";
      resourceAttrs.forEach(function (a) { h += "<option value='" + esc(a) + "'" + (F.resourceAttr === a ? ' selected' : '') + ">" + esc(a) + "</option>"; });
      h += "</select>"
         + "<input type='text' id='fResourceAttrValue' placeholder='" + resourceValPlaceholder + "' value='" + esc(F.resourceAttrValue) + "'>"
         + "</div>";
    }

    h += "</div></div>"; // fp-section-body + fp-section (target)

    // ── Changes & Roles section ─────────────────────────────────────────────
    h += "<div class='fp-section'>" + secHdr('changes', 'Changes & Roles');
    h += "<div class='fp-section-body fp-rows' id='fp-sec-changes' style='display:" + (sectionOpen.changes ? '' : 'none') + "'>";

    var valPlaceholder = (F.changesAttr && F.changesAttr !== '__all__')
      ? 'Search in ' + esc(F.changesAttr) + '\u2026'
      : 'Search any value\u2026';

    h += "<div class='fp-group'><span class='fp-lbl'>Changes</span>"
       + "<select id='fChangesAttr'" + (attrDisabled ? " disabled style='opacity:.5'" : '') + ">";
    if (attrDisabled) {
      h += "<option value='__all__'>Select target first</option>";
    } else {
      h += "<option value='__all__'>Any attribute</option>";
      allAttrs.forEach(function (a) { h += "<option value='" + esc(a) + "'" + (F.changesAttr === a ? ' selected' : '') + ">" + esc(a) + "</option>"; });
    }
    h += "</select>"
       + "<div class='fp-minmax'>"
       + "<input type='number' id='fChangesMin' placeholder='min' value='" + esc(F.changesMin) + "' min='0'>"
       + "<input type='number' id='fChangesMax' placeholder='max' value='" + esc(F.changesMax) + "' min='0'>"
       + "</div>"
       + "<input type='text' id='fChangesValue' placeholder='" + valPlaceholder + "' value='" + esc(F.changesValue) + "'>"
       + "</div>";

    var rolesValPlaceholder = (F.rolesDir && F.rolesDir !== '__all__')
      ? 'Search in ' + (F.rolesDir === 'add' ? 'added' : 'removed') + ' roles\u2026'
      : 'Search role name\u2026';
    h += "<div class='fp-group'><span class='fp-lbl'>Roles</span>"
       + "<select id='fRolesDir'>"
       + "<option value='__all__'" + (F.rolesDir === '__all__' ? ' selected' : '') + ">All directions</option>"
       + "<option value='add'"     + (F.rolesDir === 'add'     ? ' selected' : '') + ">Added</option>"
       + "<option value='remove'"  + (F.rolesDir === 'remove'  ? ' selected' : '') + ">Removed</option>"
       + "</select>"
       + "<div class='fp-minmax'>"
       + "<input type='number' id='fRolesMin' placeholder='min' value='" + esc(F.rolesMin) + "' min='0'>"
       + "<input type='number' id='fRolesMax' placeholder='max' value='" + esc(F.rolesMax) + "' min='0'>"
       + "</div>"
       + "<input type='text' id='fRolesValue' placeholder='" + rolesValPlaceholder + "' value='" + esc(F.rolesValue) + "'>"
       + "</div>";

    h += "</div></div>"; // fp-section-body + fp-section

    h += "</div>"; // fp
    return h;
  }

  function buildRolesSection(roles) {
    function section(arr, cls, label, color) {
      if (!arr.length) return '';
      var o = "<div style='margin-top:8px'><div class='roles-label' style='color:" + color + "'>" + label + " (" + arr.length + ")</div><div class='roles-list'>";
      arr.forEach(function (r) { o += "<span class='role-chip " + cls + "' title='" + esc(r.key) + "'>" + esc(r.name) + "</span>"; });
      return o + "</div></div>";
    }
    var ra = roles.filter(function (r) { return r.direction === 'add';     });
    var rr = roles.filter(function (r) { return r.direction === 'remove';  });
    var ru = roles.filter(function (r) { return r.direction === 'unknown'; });
    return section(ra, 'role-add', 'Roles Added',    'var(--add)')
         + section(rr, 'role-rem', 'Roles Removed',  'var(--del)')
         + section(ru, 'role-unk', 'Roles (unknown)', 'var(--tx2)');
  }

  function buildDetailRow(d, gi) {
    var ch = d.changes || {}, ck = Object.keys(ch), roles = d.roles || [];
    var h = "<tr><td colspan='7' style='padding:0'><div class='det'>"
          + "<div class='det-meta'>File: " + esc(d.fileName || '\u2014')
          + " \u00B7 RT: " + esc(d.resourceType || d.resourceTypeDir || '\u2014') + "</div>";
    if (ck.length > 0) {
      h += "<div class='changes-grid'>";
      ck.forEach(function (k) {
        var v = ch[k], isHl = F.changesAttr && F.changesAttr !== '__all__' && k === F.changesAttr;
        var vStr = v == null ? 'null' : String(v);
        h += "<div class='change-item" + (isHl ? ' hl' : '') + "'>"
           + "<span class='change-key'>" + esc(k) + "</span>"
           + "<span class='change-val" + (v == null ? ' null-val' : '') + "' title='" + esc(v) + "'>" + escHL(vStr, F.changesValue) + "</span></div>";
      });
      h += "</div>";
    } else {
      h += "<div style='color:var(--tx3);font-size:11px'>No changes.</div>";
    }
    h += buildRolesSection(roles);
    return h + "</div></td></tr>";
  }

  function rowExpKey(d) {
    return (d.fileName || '') + '||' + (d.ownerIdentifier || '') + '||' + (d.fileDate || '') + '||' + (d.changeType || '');
  }

  function buildTableRows(pageData, pageOffset) {
    var h = '';
    pageData.forEach(function (d, i) {
      var gi    = pageOffset + i;
      var expKey = rowExpKey(d);
      var bc    = badgeClass(d.changeType);
      var ch    = d.changes || {}, roles = d.roles || [];
      var ra    = roles.filter(function (r) { return r.direction === 'add';     });
      var rr    = roles.filter(function (r) { return r.direction === 'remove';  });
      var ru    = roles.filter(function (r) { return r.direction === 'unknown'; });
      var isExp = !!expanded[expKey];
      h += "<tr data-idx='" + gi + "' data-expkey='" + esc(expKey) + "'>"
         + "<td>" + fmtDate(d.fileDate) + "</td>"
         + "<td><div style='font-weight:500'>" + esc(d.ownerName || '\u2014') + "</div>"
         + (d.ownerIdentifier ? "<div style='font-size:9px;color:var(--tx3)'>" + esc(d.ownerIdentifier) + "</div>" : '')
         + "</td>"
         + "<td><span class='badge " + bc + "'>" + esc(d.changeType || '?') + "</span></td>"
         + "<td><span class='et-tag' title='" + esc(d.sourceEntity) + "'>" + esc(d.sourceEntity || '\u2014') + "</span>"
         + (d.owner && typeof d.owner === 'object' && Object.keys(d.owner).length > 0 ? " <button class='btn-owner btn-inline' data-owner-idx='" + gi + "'>\uD83D\uDC64 Source</button>" : "")
         + "</td>"
         + "<td><span class='et-tag' title='" + esc(d.targetEntity) + "'>" + esc(d.targetEntity || '\u2014') + "</span>"
         + (d.resource && typeof d.resource === 'object' && Object.keys(d.resource).length > 0 ? " <button class='btn-resource btn-inline' data-resource-idx='" + gi + "'>\uD83C\uDFAF Target</button>" : "")
         + "</td>"
         + "<td style='color:var(--tx3)'>" + Object.keys(ch).length + " <span style='font-size:9px'>" + (isExp ? '\u25B2' : '\u25BC') + "</span></td>"
         + "<td style='color:var(--tx3)'>";
      if (roles.length > 0) {
        var parts = [];
        if (ra.length) parts.push("<span style='color:var(--add)'>+" + ra.length + "</span>");
        if (rr.length) parts.push("<span style='color:var(--del)'>-" + rr.length + "</span>");
        if (ru.length) parts.push("<span style='color:var(--tx2)'>"  + ru.length + "</span>");
        h += parts.join('/');
      } else { h += '\u2014'; }
      h += "</td></tr>";
      if (isExp) h += buildDetailRow(d, gi);
    });
    return h;
  }

  function buildPagination(total) {
    if (total <= PAGE_SIZE) return '';
    var tp = Math.ceil(total / PAGE_SIZE);
    return "<div class='pagination'><span>Page " + (page + 1) + "/" + tp + " (" + total + ")</span>"
         + "<div class='page-btns'>"
         + "<button data-pg='0'"          + (page === 0     ? ' disabled' : '') + ">&#171;</button>"
         + "<button data-pg='" + (page-1) + "'" + (page === 0     ? ' disabled' : '') + ">&#8249;</button>"
         + "<button data-pg='" + (page+1) + "'" + (page >= tp-1   ? ' disabled' : '') + ">&#8250;</button>"
         + "<button data-pg='" + (tp-1)   + "'" + (page >= tp-1   ? ' disabled' : '') + ">&#187;</button>"
         + "</div></div>";
  }

  function buildOrders(pageData, stats, timeline, total, ses, tes, links, allAttrs, ownerAttrs, resourceAttrs) {
    var h = buildStats(stats)
          + buildTimeline(timeline)
          + buildFilterPanel(ses, tes, links, allAttrs, ownerAttrs, resourceAttrs)
          + "<div class='table-wrap' style='max-height:70vh;overflow-y:auto'><table><thead>"
          + "<tr>"
          + "<th data-sort='fileDate'>Date"         + sortArrow('fileDate')      + "</th>"
          + "<th data-sort='ownerName'>Owner"        + sortArrow('ownerName')     + "</th>"
          + "<th data-sort='changeType'>Type"        + sortArrow('changeType')    + "</th>"
          + "<th data-sort='sourceEntity'>Source"    + sortArrow('sourceEntity')  + "</th>"
          + "<th data-sort='targetEntity'>Target"    + sortArrow('targetEntity')  + "</th>"
          + "<th data-sort='changesCount'>Changes"   + sortArrow('changesCount')  + "</th>"
          + "<th data-sort='rolesCount'>Roles"       + sortArrow('rolesCount')    + "</th>"
          + "</tr>"
          + "</thead><tbody>"
          + (pageData.length === 0
              ? "<tr><td colspan='7' class='empty'>No provisioning orders match your filters.</td></tr>"
              : buildTableRows(pageData, page * PAGE_SIZE))
          + "</tbody></table>"
          + buildPagination(total)
          + "</div>";
    return h;
  }

  // ── Lifecycle helpers ──────────────────────────────────────────────────────

  function lcGetSuggestions() {
    // Returns { list, truncated } from current search term
    if (!F.lifecycleSearch || F.lifecycleSearch.length < 2) return { list: [], truncated: false };
    if (serverMode) {
      if (!serverLifecycle) return null; // loading
      return { list: serverLifecycle.owners || [], truncated: serverLifecycle.truncated || false };
    }
    var q = F.lifecycleSearch.toLowerCase(), ownerMap = {};
    data.forEach(function (d) {
      var key = d.ownerIdentifier || d.ownerName || 'Unknown';
      if ((d.ownerName||'').toLowerCase().indexOf(q) < 0 && (d.ownerIdentifier||'').toLowerCase().indexOf(q) < 0) return;
      if (!ownerMap[key]) ownerMap[key] = { name: d.ownerName||'Unknown', id: d.ownerIdentifier||'', orders: [] };
      ownerMap[key].orders.push(d);
    });
    var arr = Object.keys(ownerMap).map(function(k){ return ownerMap[k]; })
      .sort(function(a,b){ return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : 1; });
    arr.forEach(function(ow){ ow.orders.sort(function(a,b){ return (a.fileDate||'').localeCompare(b.fileDate||''); }); });
    return { list: arr.slice(0, 20), truncated: arr.length > 20 };
  }

  function lcBuildTimeline() {
    // Gather all dates across selected owners
    var allDates = {};
    lcSelected.forEach(function(key) {
      var od = lcOwnerData[key]; if (!od) return;
      od.orders.forEach(function(d) { var dk = (d.fileDate||'').substring(0,10); if (dk) allDates[dk] = 1; });
    });
    var sortedDates = Object.keys(allDates).sort();
    if (!sortedDates.length) return "<div class='empty'>No orders found.</div>";

    var minDate = sortedDates[0], maxDate = sortedDates[sortedDates.length-1];
    var spanMs  = new Date(maxDate) - new Date(minDate);
    function pct(dk) {
      if (spanMs <= 0) return 50;
      return Math.min(98, Math.max(2, ((new Date(dk) - new Date(minDate)) / spanMs) * 100));
    }

    var h = "<div class='lc-compare'>";

    lcSelected.forEach(function(key) {
      var od = lcOwnerData[key]; if (!od) return;
      var color   = od.color;
      var isOpen  = lcActiveOwner === key;
      var rowRing = isOpen ? 'background:' + hexToRgba(color, 0.06) + ';border-radius:4px;' : '';

      // Group orders by date (for dot display)
      var byDate = {};
      od.orders.forEach(function(d) {
        var dk = (d.fileDate||'').substring(0,10); if (!dk) return;
        if (!byDate[dk]) byDate[dk] = [];
        byDate[dk].push(d);
      });

      h += "<div class='lc-tl-owner-row'>";

      // Clickable track row — entire row toggles all orders
      h += "<div class='lc-tl-row' data-lc-owner='" + esc(key) + "' style='cursor:pointer;" + rowRing + "'>";
      h += "<div class='lc-tl-label' style='color:" + color + "' title='" + esc(od.name) + "'>"
         + "<span style='font-size:9px;margin-right:4px'>" + (isOpen ? '\u25BE' : '\u25B8') + "</span>"
         + esc(od.name) + "</div>";
      h += "<div class='lc-tl-track'>";
      h += "<div class='lc-tl-line' style='background:" + hexToRgba(color, isOpen ? 0.5 : 0.25) + "'></div>";

      Object.keys(byDate).sort().forEach(function(dk) {
        var evts    = byDate[dk];
        var p       = pct(dk);
        var isMulti = evts.length > 1;
        var dotBg   = color;
        if (!isMulti) {
          var ct = (evts[0].changeType||'').toLowerCase();
          if      (ct==='added')    dotBg = 'var(--add)';
          else if (ct==='modified') dotBg = 'var(--mod)';
          else if (ct==='deleted')  dotBg = 'var(--del)';
        }
        h += "<div class='lc-node" + (isMulti ? ' multi' : '') + (isOpen ? ' lc-node-active' : '')
           + "' style='left:" + p.toFixed(2) + "%'>"
           + "<div class='lc-node-dot' style='background:" + dotBg + (isOpen ? ';box-shadow:0 0 0 3px '+hexToRgba(color,0.25) : '') + "'>"
           + (isMulti ? String(evts.length) : '')
           + "</div></div>";
      });

      h += "</div></div>"; // track + row

      // Full order list panel — all orders, grouped by date
      if (isOpen) {
        var allOrders = od.orders.slice().sort(function(a,b){ return (a.fileDate||'').localeCompare(b.fileDate||''); });
        h += "<div class='lc-node-panel'><div class='lc-node-panel-spacer'></div><div class='lc-node-panel-body'>";
        h += "<div style='font-size:10px;color:var(--tx3);margin-bottom:6px'>" + allOrders.length + " order" + (allOrders.length>1?'s':'') + "</div>";

        var currentDate = null;
        allOrders.forEach(function(d) {
          var cacheIdx = lcRecordCache.length;
          lcRecordCache.push(d);
          var ch   = d.changes||{}, ck = Object.keys(ch), roles = d.roles||[];
          var bc   = badgeClass(d.changeType);
          var nch  = ck.length;
          var ra   = roles.filter(function(r){ return r.direction==='add'; }).length;
          var rr   = roles.filter(function(r){ return r.direction==='remove'; }).length;
          var ru   = roles.filter(function(r){ return r.direction==='unknown'; }).length;
          var date = d.fileDate ? d.fileDate.substring(0, 10) : '';
          var time = d.fileDate && d.fileDate.length > 10 ? d.fileDate.substring(11) : '';
          var pKey = key + '||' + (d.fileName||'') + '||' + (d.fileDate||'');
          var isExp = !!lcPanelExpanded[pKey];

          // Date group separator
          if (date !== currentDate) {
            currentDate = date;
            h += "<div style='display:flex;align-items:center;gap:8px;margin:8px 0 4px'>"
               + "<span style='font-size:10px;font-weight:600;color:var(--tx2);font-family:var(--mo);white-space:nowrap'>" + esc(date) + "</span>"
               + "<div style='flex:1;height:1px;background:var(--brd)'></div>"
               + "</div>";
          }

          // Collapsed row (time only, date is shown in separator)
          h += "<div class='lc-row-wrap'>"
             + "<div class='lc-prow' data-lc-prow='" + esc(pKey) + "'>"
             + "<span class='lc-arrow'>" + (isExp ? '\u25BE' : '\u25B8') + "</span>"
             + (time ? "<span style='color:var(--tx3);font-size:10px;font-family:var(--mo);min-width:60px;flex-shrink:0'>" + esc(time) + "</span>" : "")
             + "<span class='badge " + bc + "' style='font-size:9px'>" + esc(d.changeType||'?') + "</span>"
             + "<span style='flex:1;font-size:10px;font-family:var(--mo)'>"
             + "<span class='et-tag'>" + esc(d.sourceEntity||'?') + "</span>"
             + "<span style='color:var(--tx3);margin:0 4px;font-size:15px;line-height:1;vertical-align:middle;position:relative;top:-2px'>\u279C</span>"
             + "<span class='et-tag'>" + esc(d.targetEntity||'?') + "</span>"
             + "</span>"
             + "<span style='color:var(--tx3);font-size:10px;font-family:var(--mo)'>" + nch + " attr</span>";
          if (ra||rr||ru) {
            h += "<span style='font-size:10px;font-family:var(--mo);margin-left:6px'>";
            if (ra) h += "<span style='color:var(--add)'>+" + ra + "</span> ";
            if (rr) h += "<span style='color:var(--del)'>-" + rr + "</span> ";
            if (ru) h += "<span style='color:var(--tx3)'>" + ru + "</span>";
            h += "</span>";
          }
          if (d.owner    && Object.keys(d.owner).length    > 0) h += "<button class='btn-owner btn-lc-owner btn-inline' data-lc-idx='" + cacheIdx + "'>\uD83D\uDC64 Source</button>";
          if (d.resource && Object.keys(d.resource).length > 0) h += "<button class='btn-resource btn-lc-resource btn-inline' data-lc-idx='" + cacheIdx + "'>\uD83C\uDFAF Target</button>";
          h += "</div>"; // lc-prow

          if (isExp) {
            h += "<div class='lc-detail'>";
            h += "<div style='font-size:10px;color:var(--tx3);margin-bottom:8px'>File: " + esc(d.fileName||'\u2014')
               + " \u00B7 RT: " + esc(d.resourceType||d.resourceTypeDir||'\u2014') + "</div>";
            if (nch > 0) {
              h += "<div class='changes-grid'>";
              ck.forEach(function(k) {
                var v = ch[k], vStr = v==null?'null':String(v);
                h += "<div class='change-item'><span class='change-key'>" + esc(k) + "</span>"
                   + "<span class='change-val" + (v==null?' null-val':'') + "'>" + esc(vStr) + "</span></div>";
              });
              h += "</div>";
            } else {
              h += "<div style='color:var(--tx3);font-size:11px'>No changes.</div>";
            }
            h += buildRolesSection(roles);
            h += "</div>"; // lc-detail
          }

          h += "</div>"; // lc-row-wrap
        });

        h += "</div></div>"; // panel-body + panel
      }

      h += "</div>"; // lc-tl-owner-row
    });

    // Shared date axis
    h += "<div style='display:flex;gap:12px;margin-top:4px'>";
    h += "<div style='width:150px;flex-shrink:0'></div><div style='flex:1;position:relative;height:16px'>";
    var axDates = sortedDates.length === 1 ? [sortedDates[0]] : (function() {
      var out = [], max = Math.min(8, sortedDates.length);
      var step = Math.max(1, Math.floor((sortedDates.length-1) / (max-1)));
      for (var i = 0; i < sortedDates.length; i += step) out.push(sortedDates[i]);
      if (out[out.length-1] !== sortedDates[sortedDates.length-1]) out.push(sortedDates[sortedDates.length-1]);
      return out;
    })();
    axDates.forEach(function(dk) {
      h += "<span style='position:absolute;left:" + pct(dk).toFixed(2) + "%;transform:translateX(-50%);font-size:9px;color:var(--tx3);font-family:var(--mo);white-space:nowrap'>" + esc(dk) + "</span>";
    });
    h += "</div></div>"; // axis

    h += "</div>"; // lc-compare
    return h;
  }

  function buildLifecycle() {
    lcRecordCache = [];

    var h = "<div class='lc-search-box'>"
          + "<input type='text' id='lcSearch' placeholder='Search owner by name or id\u2026' value='" + esc(F.lifecycleSearch) + "'>"
          + "</div>";

    // Suggestions
    if (F.lifecycleSearch && F.lifecycleSearch.length >= 2) {
      var sug = lcGetSuggestions();
      if (sug === null) {
        h += "<div class='empty'>Loading\u2026</div>";
      } else if (sug.list.length > 0) {
        h += "<div class='lc-suggestions'>";
        sug.list.forEach(function(ow) {
          var owKey = ow.id || ow.name;
          var isSel = lcSelected.indexOf(owKey) >= 0;
          h += "<div class='lc-sug-item" + (isSel ? ' sug-sel' : '') + "' data-sug-key='" + esc(owKey) + "'>"
             + "<span>" + esc(ow.name) + (ow.id ? "<span style='color:var(--tx3);font-size:10px'> \u00B7 " + esc(ow.id) + "</span>" : "") + "</span>"
             + (isSel ? "<span style='color:var(--ac);font-size:11px'>\u2714 added</span>"
                      : "<span style='color:var(--tx3);font-size:11px'>+ add</span>")
             + "</div>";
        });
        if (sug.truncated) h += "<div style='padding:5px 12px;font-size:10px;color:var(--tx3)'>Showing first 20 \u2014 refine search.</div>";
        h += "</div>";
      } else {
        h += "<div style='color:var(--tx3);font-size:11px;margin:4px 0 10px'>No matches for \u2018" + esc(F.lifecycleSearch) + "\u2019.</div>";
      }
    }

    // Chips
    if (lcSelected.length > 0) {
      h += "<div class='lc-chips'>";
      lcSelected.forEach(function(key) {
        var od = lcOwnerData[key]; if (!od) return;
        h += "<div class='lc-chip' style='border-color:" + od.color + ";color:" + od.color + ";background:" + hexToRgba(od.color, 0.08) + "'>"
           + esc(od.name)
           + "<button class='lc-chip-rm' data-rm-key='" + esc(key) + "'>&#215;</button>"
           + "</div>";
      });
      h += "</div>";
    }

    if (lcSelected.length === 0) {
      if (!F.lifecycleSearch || F.lifecycleSearch.length < 2) {
        h += "<div class='empty'>Type at least 2 characters to search for an owner, then click to add them to the timeline.</div>";
      }
      return h;
    }

    h += lcBuildTimeline();
    return h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════════════════

  function render() {
    var focusId  = document.activeElement ? document.activeElement.id : '';
    var focusSel = (document.activeElement && document.activeElement.selectionStart != null)
                 ? document.activeElement.selectionStart : -1;
    var tw = document.querySelector('.table-wrap'), twScrl = tw ? tw.scrollTop : 0;

    var pageData, stats, timeline, total, ses, tes, links, allAttrs, ownerAttrs, resourceAttrs;
    var emptyStats = { total: 0, added: 0, modified: 0, deleted: 0, rtCount: 0 };

    if (serverMode) {
      ses           = serverMeta.sourceEntities  || [];
      tes           = serverMeta.targetEntities  || [];
      links         = serverMeta.entityLinks     || { s2t: {}, t2s: {} };
      allAttrs      = (serverResult && serverResult.availableAttrs) || [];
      ownerAttrs    = serverMeta.ownerAttrs    || [];
      resourceAttrs = serverMeta.resourceAttrs || [];
      total    = serverResult ? serverResult.total    : 0;
      stats    = serverResult ? serverResult.stats    : emptyStats;
      timeline = serverMeta.fullTimeline || (serverResult ? serverResult.timeline : []);
      pageData = serverResult ? serverResult.records  : [];

      // Show initial loading state before first fetch
      if (!serverResult && activeTab === 'orders') {
        document.getElementById('app').innerHTML =
          buildHeader(0, emptyStats) + buildTabs()
          + "<div class='empty'>Loading\u2026</div>";
        return;
      }
    } else {
      var localFiltered = getFiltered();
      ses           = getUniqueValues('sourceEntity');
      tes           = getUniqueValues('targetEntity');
      links         = getEntityLinks();
      allAttrs      = getFilteredAttrs();
      ownerAttrs    = getOwnerAttrs();
      resourceAttrs = getResourceAttrs();
      total    = localFiltered.length;
      stats    = getStats(localFiltered);
      timeline = getTimeline(data);
      var tp   = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (page >= tp) page = tp - 1;
      if (page < 0)   page = 0;
      pageData = localFiltered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
    }

    // Reset stale attribute filter
    if (F.changesAttr && F.changesAttr !== '__all__' && allAttrs.indexOf(F.changesAttr) < 0) {
      F.changesAttr = '__all__';
    }

    var content = activeTab === 'orders'
      ? buildOrders(pageData, stats, timeline, total, ses, tes, links, allAttrs, ownerAttrs, resourceAttrs)
      : buildLifecycle();

    document.getElementById('app').innerHTML = buildHeader(total, stats) + buildTabs() + content;

    var tw2 = document.querySelector('.table-wrap');
    if (tw2) tw2.scrollTop = twScrl;
    if (focusId) {
      var fe = document.getElementById(focusId);
      if (fe) { fe.focus(); if (focusSel >= 0) try { fe.setSelectionRange(focusSel, focusSel); } catch (e) {} }
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // MODAL
  // ═══════════════════════════════════════════════════════════════════════════

  function renderAttrValue(k, v) {
    // Scalar
    if (v == null)                                        return '<span class="owner-val null-val">null</span>';
    if (typeof v !== 'object')                            return '<span class="owner-val">' + esc(String(v)) + '</span>';
    // Array
    if (Array.isArray(v)) {
      var repr = JSON.stringify(v);
      return '<span class="owner-val" title="' + esc(repr) + '">' + esc(repr) + '</span>';
    }
    // Object — 1 key: show inline as key.subkey
    var subKeys = Object.keys(v);
    if (subKeys.length === 1) {
      var sk = subKeys[0], sv = v[sk];
      return '<span class="owner-val"><span style="color:var(--tx3)">' + esc(sk) + ':</span> ' + esc(sv == null ? 'null' : String(sv)) + '</span>';
    }
    // Object — multiple keys: show a toggle button
    var id = 'obj-' + k.replace(/\W/g, '_');
    var repr = JSON.stringify(v, null, 2);
    return '<button class="obj-toggle" data-obj-id="' + esc(id) + '" style="font-size:10px;padding:1px 6px;cursor:pointer">'
         + subKeys.length + ' fields \u25BE</button>'
         + '<pre id="' + esc(id) + '" class="obj-pre" style="display:none;white-space:pre-wrap;word-break:break-all;font-size:10px;margin:4px 0 0;padding:5px;background:var(--bg);border-radius:3px;border:1px solid var(--brd)">' + esc(repr) + '</pre>';
  }

  function openDetailsModal(icon, title, subtitle, obj) {
    var keys = Object.keys(obj || {});
    var h = "<h2>" + icon + " " + esc(title) + "</h2>"
          + "<div class='modal-sub'>" + esc(subtitle) + "</div>";
    if (keys.length > 0) {
      h += "<div class='owner-grid'>";
      keys.forEach(function (k) {
        var v = obj[k];
        h += "<div class='owner-item'><span class='owner-key'>" + esc(k) + "</span>"
           + renderAttrValue(k, v) + "</div>";
      });
      h += "</div>";
    } else {
      h += "<div style='color:var(--tx3);font-size:11px;padding:12px 0'>No data.</div>";
    }
    h += "<button class='btn-modal-close' id='modalClose'>Close</button>";
    document.getElementById('modal').innerHTML = h;
    document.getElementById('modalBg').classList.add('open');
    // Wire up obj-toggle buttons inside modal
    document.getElementById('modal').addEventListener('click', function (ev) {
      var btn = ev.target.closest && ev.target.closest('.obj-toggle');
      if (!btn) return;
      var pre = document.getElementById(btn.getAttribute('data-obj-id'));
      if (!pre) return;
      var open = pre.style.display !== 'none';
      pre.style.display = open ? 'none' : 'block';
      var cnt = btn.innerHTML.replace(/[\s▾▴].*/,'').trim();
      btn.innerHTML = cnt + (open ? ' \u25BE' : ' \u25B4');
    });
  }

  function openOwnerModal(d) {
    var sub = (d.ownerName || 'Unknown') + (d.ownerIdentifier ? ' \u00B7 ' + d.ownerIdentifier : '');
    openDetailsModal('\uD83D\uDC64', 'Source', sub, d.owner || {});
  }

  function openResourceModal(d) {
    var sub = (d.resourceDisplayName || 'Unknown') + (d.resourceIdentifier ? ' \u00B7 ' + d.resourceIdentifier : '');
    openDetailsModal('\uD83C\uDFAF', 'Target', sub, d.resource || {});
  }

  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

  // ═══════════════════════════════════════════════════════════════════════════
  // EVENTS — bound once, delegated to document
  // ═══════════════════════════════════════════════════════════════════════════

  function initEvents() {
    var debounceTimer;
    var tlDrag = { active: false, start: null, end: null };

    document.addEventListener('click', function (ev) {
      var t = ev.target;
      if (t.id === 'modalClose' || t.id === 'modalBg') { closeModal(); return; }

      var tabEl = t.closest && t.closest('[data-tab]');
      if (tabEl) {
        activeTab = tabEl.getAttribute('data-tab');
        page = 0;
        lcActiveOwner = null; lcPanelExpanded = {};
        triggerRender();
        return;
      }

      if (t.id === 'btnExport') { exportCSV(); return; }
      if (t.id === 'btnReset')  { resetFilters(); return; }

      var secHdr = t.closest && t.closest('.fp-section-hdr[data-section]');
      if (secHdr) {
        var sec  = secHdr.getAttribute('data-section');
